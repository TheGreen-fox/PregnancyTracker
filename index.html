<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TheGreen Pregnancy">
<meta name="theme-color" content="#7c3aed">
<title>TheGreen Pregnancy Tracker</title>
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0f0a1e; --card:#1c1430; --accent:#a78bfa; --accent2:#7c3aed;
    --text:#f4f1fb; --muted:#9b91b8; --line:#2e2347; --good:#34d399; --warn:#fbbf24;
  }
  html,body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg); color:var(--text);
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height:100vh; overflow-x:hidden;
  }
  .wrap { max-width:520px; margin:0 auto; padding:20px 16px 40px; }
  .apptitle {
    text-align:center; font-size:18px; font-weight:800; letter-spacing:.3px;
    margin-bottom:18px; color:var(--accent);
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .apptitle::before { content:"🤰"; font-size:20px; }
  .hero {
    background:linear-gradient(160deg,#2a1a4a 0%,#1c1430 100%);
    border:1px solid var(--line); border-radius:28px;
    padding:32px 24px; text-align:center; margin-bottom:16px;
    box-shadow:0 10px 40px rgba(124,58,237,.2);
  }
  .hero .label { color:var(--muted); font-size:15px; font-weight:600; margin-bottom:8px; }
  .big {
    font-size:clamp(48px,16vw,76px); font-weight:800; line-height:1.05;
    background:linear-gradient(135deg,#c4b5fd,#a78bfa); -webkit-background-clip:text;
    background-clip:text; color:transparent; margin:4px 0;
  }
  .big .unit { font-size:.4em; color:var(--muted); -webkit-text-fill-color:var(--muted); font-weight:700; }
  .trimester { display:inline-block; margin-top:14px; padding:7px 18px; border-radius:999px;
    background:rgba(167,139,250,.15); color:var(--accent); font-weight:700; font-size:15px; }
  .meta-row { display:flex; gap:10px; margin-bottom:16px; }
  .meta {
    flex:1; background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:16px 12px; text-align:center;
  }
  .meta .v { font-size:22px; font-weight:800; color:var(--accent); }
  .meta .k { font-size:12px; color:var(--muted); margin-top:4px; }
  .progress-wrap { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:16px; }
  .progress-top { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:10px; }
  .bar { height:12px; background:#241a3d; border-radius:999px; overflow:hidden; }
  .bar > div { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:999px; transition:width .6s; }
  .section-title { font-size:17px; font-weight:800; margin:24px 4px 12px; display:flex; align-items:center; justify-content:space-between; }
  .btn {
    background:var(--accent2); color:#fff; border:none; border-radius:14px;
    padding:13px 18px; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; width:100%;
  }
  .btn.ghost { background:var(--card); border:1px solid var(--line); color:var(--accent); }
  .btn.sm { width:auto; padding:8px 14px; font-size:14px; border-radius:11px; }
  .btn.danger { background:transparent; color:#f87171; border:1px solid #5a2535; }
  .empty { color:var(--muted); text-align:center; padding:28px 12px; background:var(--card); border:1px dashed var(--line); border-radius:18px; font-size:15px; }
  .event {
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px 16px; margin-bottom:10px; display:flex; gap:14px; align-items:flex-start;
    cursor:pointer; transition:background .15s;
  }
  .event:active { background:#241a3d; }
  .event.past { opacity:.45; }
  .event.now { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .event.next { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), 0 6px 20px rgba(124,58,237,.25); }
  .ev-date { min-width:64px; text-align:center; }
  .ev-date .dnum { font-size:24px; font-weight:800; line-height:1; color:var(--text); }
  .ev-date .dmon { font-size:12px; color:var(--muted); font-weight:600; margin-top:2px; }
  .ev-date .dyr { font-size:11px; color:var(--muted); margin-top:1px; }
  .ev-week { background:var(--accent2); color:#fff; border-radius:12px; min-width:54px; text-align:center;
    padding:8px 6px; font-weight:800; line-height:1.1; align-self:center; }
  .ev-week small { display:block; font-size:11px; font-weight:600; opacity:.8; }
  .ev-body { flex:1; }
  .ev-body .t { font-weight:700; font-size:16px; }
  .ev-body .n { color:var(--muted); font-size:14px; margin-top:3px; white-space:pre-wrap; }
  .ev-body .when { color:var(--accent); font-size:13px; margin-top:5px; font-weight:600; }
  .ev-del { background:none; border:none; color:#6b5f86; font-size:20px; cursor:pointer; padding:2px 4px; align-self:flex-start; }
  .hist-divider { display:flex; align-items:center; gap:10px; margin:18px 2px 12px; color:var(--muted); font-size:13px; font-weight:600; }
  .hist-divider::before,.hist-divider::after { content:""; flex:1; height:1px; background:var(--line); }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:flex-end; z-index:50; }
  .overlay.show { display:flex; }
  .sheet { background:var(--bg); width:100%; max-width:520px; margin:0 auto; border-radius:24px 24px 0 0;
    padding:24px 18px calc(24px + env(safe-area-inset-bottom)); border:1px solid var(--line); }
  .sheet h3 { font-size:19px; margin-bottom:16px; }
  label.fl { display:block; font-size:14px; color:var(--muted); margin:12px 2px 6px; font-weight:600; }
  input,textarea {
    width:100%; max-width:100%; background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; color:var(--text); font-size:16px; font-family:inherit;
  }
  input[type="date"] {
    -webkit-appearance:none; appearance:none;
    min-width:0; min-height:48px; display:block; text-align:right;
  }
  input[type="date"]::-webkit-date-and-time-value { text-align:right; margin:0; }
  input[type="date"]::-webkit-calendar-picker-indicator { margin:0; }
  textarea { resize:vertical; min-height:70px; }
  .seg { display:flex; gap:8px; }
  .seg input { text-align:center; }
  .toggle { display:flex; gap:6px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:4px; margin-top:6px; }
  .toggle button { flex:1; background:none; border:none; color:var(--muted); font-family:inherit; font-size:15px; font-weight:700; padding:9px; border-radius:9px; cursor:pointer; }
  .toggle button.on { background:var(--accent2); color:#fff; }
  .actions { display:flex; gap:10px; margin-top:20px; }
  .hint { font-size:12px; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="apptitle">TheGreen Pregnancy Tracker</div>
  <div id="app"></div>
</div>

<!-- LMP setup / current display rendered into #app -->

<div class="overlay" id="eventOverlay">
  <div class="sheet">
    <h3 id="evTitle">תור / בדיקה חדשים</h3>
    <label class="fl">כותרת</label>
    <input id="evT" placeholder="למשל: סקירת מערכות">
    <label class="fl">איך לקבוע את מועד האירוע?</label>
    <div class="toggle">
      <button id="modeDate" class="on" onclick="setEvMode('date')">לפי תאריך</button>
      <button id="modeWeek" onclick="setEvMode('week')">לפי שבוע</button>
    </div>
    <div id="dateBlock">
      <label class="fl">תאריך האירוע</label>
      <input id="evDate" type="date" onchange="updateEvPreview()">
    </div>
    <div id="weekBlock" style="display:none">
      <label class="fl">שבוע + יום (יום אופציונלי)</label>
      <div class="seg">
        <input id="evW" type="number" min="0" max="45" inputmode="numeric" placeholder="שבוע" oninput="updateEvPreview()">
        <input id="evD" type="number" min="0" max="6" inputmode="numeric" placeholder="יום" oninput="updateEvPreview()">
      </div>
    </div>
    <div id="evWeekPreview" class="hint" style="font-size:14px;color:var(--accent);font-weight:700;min-height:18px;margin-top:8px"></div>
    <label class="fl">הערות</label>
    <textarea id="evN" placeholder="פרטים, מיקום, הכנות..."></textarea>
    <div class="actions">
      <button class="btn ghost" onclick="closeEvent()">ביטול</button>
      <button class="btn" onclick="saveEvent()">שמירה</button>
    </div>
  </div>
</div>

<div class="overlay" id="lmpOverlay">
  <div class="sheet">
    <h3>הגדרת תאריך וסת אחרון</h3>
    <label class="fl">היום הראשון של הווסת האחרונה</label>
    <input id="lmpInput" type="date">
    <p class="hint">גיל ההיריון מחושב מתאריך זה (סטנדרט מיילדותי, LMP + 280 ימים = תאריך לידה משוער).</p>
    <div class="actions">
      <button class="btn ghost" onclick="closeLmp()">ביטול</button>
      <button class="btn" onclick="saveLmp()">שמירה</button>
    </div>
  </div>
</div>

<script>
const KEY='preg_lmp_v1', EVKEY='preg_events_v1';
const $=id=>document.getElementById(id);
let editId=null;

function getLmp(){ const v=localStorage.getItem(KEY); return v?new Date(v+'T00:00:00'):null; }
function getEvents(){ try{return JSON.parse(localStorage.getItem(EVKEY))||[]}catch(e){return[]} }
function setEvents(a){ localStorage.setItem(EVKEY,JSON.stringify(a)); }

function daysSince(lmp){
  const a=new Date(); a.setHours(0,0,0,0);
  const b=new Date(lmp); b.setHours(0,0,0,0);
  return Math.floor((a-b)/86400000);
}
function fmtDate(d){ return d.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'}); }

// today's date at midnight
function todayMid(){ const t=new Date(); t.setHours(0,0,0,0); return t; }
// parse 'YYYY-MM-DD' to local midnight Date
function parseDate(s){ return new Date(s+'T00:00:00'); }
// get the event's date: prefer stored date; fall back to legacy week/day relative to LMP
function eventDate(e){
  if(e.date) return parseDate(e.date);
  const lmp=getLmp(); const dt=new Date(lmp); dt.setDate(dt.getDate()+(e.w*7+(e.d||0))); return dt;
}
// gestational week/day for a given date, relative to LMP
function gestAt(date){
  const lmp=getLmp(); const a=new Date(date); a.setHours(0,0,0,0);
  const b=new Date(lmp); b.setHours(0,0,0,0);
  const tot=Math.floor((a-b)/86400000);
  return { w:Math.floor(tot/7), d:tot%7, tot };
}
// live preview in the event sheet - works in both modes
let evMode='date';
function setEvMode(m){
  evMode=m;
  $('modeDate').classList.toggle('on', m==='date');
  $('modeWeek').classList.toggle('on', m==='week');
  $('dateBlock').style.display = m==='date'?'block':'none';
  $('weekBlock').style.display = m==='week'?'block':'none';
  updateEvPreview();
}
function updateEvPreview(){
  const box=$('evWeekPreview');
  if(!getLmp()){ box.textContent=''; return; }
  if(evMode==='date'){
    const v=$('evDate').value;
    if(!v){ box.textContent=''; return; }
    const g=gestAt(parseDate(v));
    if(g.tot<0){ box.textContent='התאריך לפני תחילת ההיריון'; return; }
    box.textContent=`גיל היריון בתאריך זה: שבוע ${g.w} + ${g.d} ימים`;
  } else {
    const w=parseInt($('evW').value);
    if(isNaN(w)){ box.textContent=''; return; }
    const d=parseInt($('evD').value)||0;
    const lmp=getLmp(); const dt=new Date(lmp); dt.setDate(dt.getDate()+(w*7+d));
    box.textContent=`התאריך יהיה: ${fmtDate(dt)}`;
  }
}

function render(){
  const lmp=getLmp();
  const app=$('app');
  if(!lmp){
    app.innerHTML=`
      <div class="hero">
        <div class="label">ברוכה הבאה</div>
        <div style="font-size:54px;margin:10px 0">🤰</div>
        <div style="font-size:18px;color:var(--muted);line-height:1.5">כדי להתחיל, הזיני את תאריך<br>הווסת האחרונה</div>
      </div>
      <button class="btn" onclick="openLmp()">הגדרת תאריך וסת</button>`;
    return;
  }
  const total=daysSince(lmp);
  const w=Math.floor(total/7), d=total%7;
  const edd=new Date(lmp); edd.setDate(edd.getDate()+280);
  const daysLeft=Math.ceil((edd-new Date().setHours(0,0,0,0))/86400000);
  const tri = w<13?'טרימסטר ראשון':w<27?'טרימסטר שני':'טרימסטר שלישי';
  const pct=Math.max(0,Math.min(100,(total/280)*100));

  app.innerHTML=`
    <div class="hero">
      <div class="label">גיל ההיריון כעת</div>
      <div class="big">${w}<span class="unit"> שבועות </span>${d}<span class="unit"> ימים</span></div>
      <div class="trimester">${tri}</div>
    </div>
    <div class="meta-row">
      <div class="meta"><div class="v">${daysLeft>0?daysLeft:0}</div><div class="k">ימים ללידה</div></div>
      <div class="meta"><div class="v">${total}</div><div class="k">ימים מהווסת</div></div>
      <div class="meta"><div class="v">${40-w-(d>0?1:0)>0?40-w:0}</div><div class="k">שבועות ל-40</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top"><span>תחילת היריון</span><span>${pct.toFixed(0)}%</span><span>שבוע 40</span></div>
      <div class="bar"><div style="width:${pct}%"></div></div>
      <div style="text-align:center;color:var(--muted);font-size:13px;margin-top:12px">
        לידה משוערת: <b style="color:var(--accent)">${fmtDate(edd)}</b>
      </div>
    </div>
    <div class="section-title">
      <span>תורים, בדיקות ואירועים</span>
      <button class="btn ghost sm" onclick="openEvent()">+ הוספה</button>
    </div>
    <div id="events"></div>
    <button class="btn ghost" style="margin-top:24px" onclick="openLmp()">עריכת תאריך הווסת</button>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn ghost sm" style="flex:1" onclick="exportData()">גיבוי לקובץ</button>
      <button class="btn ghost sm" style="flex:1" onclick="$('importFile').click()">שחזור מקובץ</button>
    </div>
    <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(event)">
    <p class="hint" style="text-align:center;margin-top:8px">מומלץ לגבות מדי פעם - iOS עלול למחוק נתונים אם לא נכנסים לאפליקציה כשבוע.</p>`;
  renderEvents();
}

function renderEvents(){
  const box=$('events');
  const all=getEvents();
  if(!all.length){ box.innerHTML=`<div class="empty">עדיין אין תורים או בדיקות.<br>הוסיפי אירוע ובחרי תאריך.</div>`; return; }
  const today=todayMid();
  // attach computed date, split upcoming vs past
  const withDate=all.map(e=>({e, dt:eventDate(e)}));
  const upcoming=withDate.filter(x=>x.dt>=today).sort((a,b)=>a.dt-b.dt);
  const past=withDate.filter(x=>x.dt<today).sort((a,b)=>b.dt-a.dt); // most recent past first

  const months=['ינו','פבר','מרץ','אפר','מאי','יוני','יולי','אוג','ספט','אוק','נוב','דצמ'];
  function card(x, isNext){
    const e=x.e, dt=x.dt;
    const g=gestAt(dt);
    const diff=Math.round((dt-today)/86400000);
    let when, cls='';
    if(diff<0){ cls='past'; when='היה ב-'+fmtDate(dt); }
    else if(diff===0){ cls='now'; when='היום!'; }
    else { when='בעוד '+diff+' ימים'; if(isNext) cls='next'; }
    // RTL: first DOM child renders on the right -> date on right, week on left
    return `<div class="event ${cls}" onclick="openEvent('${e.id}')">
      <div class="ev-date">
        <div class="dnum">${dt.getDate()}</div>
        <div class="dmon">${months[dt.getMonth()]}</div>
        <div class="dyr">${dt.getFullYear()}</div>
      </div>
      <div class="ev-body">
        <div class="t">${esc(e.t)}</div>
        ${e.n?`<div class="n">${esc(e.n)}</div>`:''}
        <div class="when">${when}</div>
      </div>
      <div class="ev-week">${g.w}<small>+${g.d}</small></div>
      <button class="ev-del" onclick="event.stopPropagation();delEvent('${e.id}')">✕</button>
    </div>`;
  }

  let html = upcoming.map((x,i)=>card(x, i===0)).join('');
  if(past.length){
    html += `<div class="hist-divider">היסטוריה</div>` + past.map(x=>card(x,false)).join('');
  }
  box.innerHTML=html;
}
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// LMP sheet
function openLmp(){ const l=getLmp(); $('lmpInput').value=l?l.toISOString().slice(0,10):''; $('lmpOverlay').classList.add('show'); }
function closeLmp(){ $('lmpOverlay').classList.remove('show'); }
function saveLmp(){ const v=$('lmpInput').value; if(!v){alert('יש לבחור תאריך');return;} localStorage.setItem(KEY,v); closeLmp(); render(); }

// Event sheet
function openEvent(id){
  editId=id||null;
  if(id){
    const e=getEvents().find(x=>x.id===id);
    $('evTitle').textContent='עריכת אירוע';
    $('evT').value=e.t;
    $('evN').value=e.n||'';
    if(e.byWeek || (!e.date && e.w!=null)){
      $('evW').value=e.w; $('evD').value=(e.d||0)?e.d:'';
      $('evDate').value=eventDate(e).toISOString().slice(0,10);
      setEvMode('week');
    } else {
      $('evDate').value=eventDate(e).toISOString().slice(0,10);
      $('evW').value=''; $('evD').value='';
      setEvMode('date');
    }
  } else {
    $('evTitle').textContent='תור / בדיקה / אירוע חדש';
    $('evT').value=''; $('evDate').value=''; $('evW').value=''; $('evD').value=''; $('evN').value='';
    setEvMode('date');
  }
  $('eventOverlay').classList.add('show');
}
function closeEvent(){ $('eventOverlay').classList.remove('show'); editId=null; }
function saveEvent(){
  const t=$('evT').value.trim();
  if(!t){alert('יש להזין כותרת');return;}
  let date, byWeek=false, w=null, d=0;
  if(evMode==='week'){
    w=parseInt($('evW').value);
    if(isNaN(w)){alert('יש להזין שבוע');return;}
    d=parseInt($('evD').value)||0;
    const lmp=getLmp(); const dt=new Date(lmp); dt.setDate(dt.getDate()+(w*7+d));
    date=dt.toISOString().slice(0,10); byWeek=true;
  } else {
    date=$('evDate').value;
    if(!date){alert('יש לבחור תאריך');return;}
  }
  const n=$('evN').value.trim();
  let evs=getEvents();
  if(editId){
    const e=evs.find(x=>x.id===editId);
    Object.assign(e,{t,date,n,byWeek}); 
    if(byWeek){ e.w=w; e.d=d; } else { delete e.w; delete e.d; }
  } else {
    const obj={id:Date.now()+'',t,date,n,byWeek};
    if(byWeek){ obj.w=w; obj.d=d; }
    evs.push(obj);
  }
  setEvents(evs); closeEvent(); render();
}
function delEvent(id){ if(confirm('למחוק אירוע זה?')){ setEvents(getEvents().filter(x=>x.id!==id)); render(); } }

function exportData(){
  const data={ lmp:localStorage.getItem(KEY), events:getEvents(), exported:new Date().toISOString() };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='thegreen-pregnancy-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    if(d.lmp) localStorage.setItem(KEY,d.lmp);
    if(Array.isArray(d.events)) setEvents(d.events);
    alert('הנתונים שוחזרו בהצלחה'); render();
  }catch(e){ alert('קובץ לא תקין'); } };
  r.readAsText(f); ev.target.value='';
}

render();
</script>
</body>
</html>
